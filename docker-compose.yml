services:
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: polyapi-gateway
    ports:
      - "8000:8000"
    environment:
      - SORT_MODULE_URL=http://sort:8081
      - ROOT_PATH=${ROOT_PATH:-}
    networks:
      - polyapi-net
    depends_on:
      - sort
    restart: unless-stopped

  sort:
    build:
      context: ./modules/sort
      dockerfile: Dockerfile
    container_name: polyapi-sort
    environment:
      - PORT=8081
    volumes:
      - sort-data:/app/data
    networks:
      - polyapi-net
    restart: unless-stopped

volumes:
  sort-data:
    name: polyapi-sort-data

networks:
  polyapi-net:
    driver: bridge
