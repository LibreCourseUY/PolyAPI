site_name: PolyAPI Documentation
site_description: Polyglot Microservices API Gateway
site_author: PolyAPI Team
site_url: https://polyapi.dev

docs_dir: .

repo_name: fingdev/PolyAPI
repo_url: https://github.com/fingdev/PolyAPI

copyright: Copyright &copy; 2024 PolyAPI

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/lightbulb-outline
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: blue
      toggle:
        icon: material/lightbulb
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/fingdev/PolyAPI

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
      - Architecture Overview: getting-started/architecture.md
  - Gateway:
      - Overview: gateway/overview.md
      - Configuration: gateway/configuration.md
      - API Reference: gateway/api.md
  - Modules:
      - Overview: modules/overview.md
      - Creating a Module: modules/creating.md
      - Sort Module: modules/sort.md
  - Contract:
      - JSON Contract: contract/json-contract.md
      - Error Codes: contract/error-codes.md
  - Development:
      - Contributing: development/contributing.md
      - Testing: development/testing.md

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.mark
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
